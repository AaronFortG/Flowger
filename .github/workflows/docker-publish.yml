name: Build and Publish Docker Image

on:
  push:
    tags:
      - "v*.*.*"

env:
  DOCKERHUB_IMAGE: aaronfortg/flowger
  GHCR_IMAGE: ghcr.io/aaronfortg/flowger

jobs:
  test:
    name: Run Tests & Linters
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Check typing and linting
        run: |
          uv run ruff check .
          uv run mypy flowger/

      - name: Run test suite
        run: uv run pytest

  build-and-push:
    name: Build and Push
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write    # Push to GHCR
      id-token: write    # OIDC token for provenance signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=flowger
            org.opencontainers.image.description=Sync bank transactions locally and export to CSV for Actual Budget
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push to Docker Hub + GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true   # Generates signed build provenance attestation
          sbom: true         # Generates Software Bill of Materials
          # Cache layers between runs to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # Required to create releases on GitHub
    steps:
      - name: Create Release Notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

